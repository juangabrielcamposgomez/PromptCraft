version: 1
applications:
  - appRoot: apps/web
    platform: WEB_COMPUTE
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web build
            - cp -r .next/static .next/standalone/apps/web/.next/static
            - cp -r public .next/standalone/apps/web/public
            - ls -d .next/standalone/apps/web/.next/static
            - ls -d .next/standalone/apps/web/public
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      startCommand: node server.js
