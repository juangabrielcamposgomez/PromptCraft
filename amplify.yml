version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            # ✅ Encadenamos todo en una sola línea para mantener el contexto del subshell y la variable REPO_ROOT
            - REPO_ROOT=$(pwd) && cd ../.. && pnpm --filter web run build && cp -r $REPO_ROOT/.next/static $REPO_ROOT/.next/standalone/apps/web/.next/static && ([ -d $REPO_ROOT/public ] && cp -r $REPO_ROOT/public $REPO_ROOT/.next/standalone/apps/web/ || echo "No public dir")
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      startCommand: node server.js
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
