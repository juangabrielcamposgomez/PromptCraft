version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web run build
            # 🔍 Diagnóstico de Estructura (Vemos esto en los logs de Amplify)
            - echo "--- LOCALIZANDO SERVER.JS ---"
            - find ../../ -name "server.js" -path "*standalone*" 2>/dev/null || echo "server.js not found"
            - echo "--- VERIFICANDO CASOS ---"
            - "[ -f .next/standalone/apps/web/server.js ] && echo 'CASO B: server.js anidado' || echo 'CASO A: server.js en raíz de standalone'"
            # Copia de seguridad (Intentamos ambas rutas para no fallar)
            - "[ -d public ] && cp -r public .next/standalone/apps/web/ || echo 'Public no encontrado en apps/web'"
            - "cp -r .next/static .next/standalone/apps/web/.next/static || echo 'Static copy failed'"
      artifacts:
        # Probamos con la ruta anidada primero ya que es un monorepo
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
