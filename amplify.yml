version: 1
applications:
  - appRoot: .
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - echo "--- INICIANDO PREBUILD (MODO MONOREPO ROOT) ---"
            - npm install -g pnpm@9.0.0
            - pnpm install --frozen-lockfile
            - pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - echo "--- INICIANDO BUILD DE LA APLICACIÓN WEB ---"
            - pnpm --filter web build
            # ✅ Estructura Standalone Profesional para Monorepo
            # Copiamos assets a la ruta interna jerárquica que requiere Next.js standalone
            - mkdir -p apps/web/.next/standalone/apps/web/.next
            - cp -r apps/web/public apps/web/.next/standalone/apps/web/
            - cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/
      artifacts:
        baseDirectory: apps/web/.next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
