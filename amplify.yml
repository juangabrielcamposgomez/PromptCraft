version: 1
applications:
  - appRoot: .
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - pnpm install --frozen-lockfile
            - pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - pnpm --filter web run build
            # ✅ Ajuste Fino Standalone PRO:
            # Copiamos assets a la carpeta interna donde reside el server.js del monorepo
            - cp -r apps/web/public apps/web/.next/standalone/apps/web/
            - cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/
      artifacts:
        baseDirectory: apps/web/.next/standalone/apps/web
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
