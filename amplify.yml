version: 1
applications:
  - appRoot: apps/web
    platform: WEB_COMPUTE
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web build && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static && cp -r apps/web/public apps/web/.next/standalone/apps/web/public && ls -d apps/web/.next/standalone/apps/web/.next/static && ls -d apps/web/.next/standalone/apps/web/public
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      startCommand: node server.js
