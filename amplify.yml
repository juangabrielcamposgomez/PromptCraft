version: 1
applications:
  - appRoot: apps/web
    platform: WEB_COMPUTE
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - cd ../.. && pnpm install
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web build
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
