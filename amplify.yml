version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web run build
            # ✅ Capturamos la raíz absoluta para evitar confusiones de CWD
            - REPO_ROOT=$(cd ../.. && pwd) && cp -r $REPO_ROOT/apps/web/.next/static $REPO_ROOT/apps/web/.next/standalone/apps/web/.next/static
            - REPO_ROOT=$(cd ../.. && pwd) && ([ -d $REPO_ROOT/apps/web/public ] && cp -r $REPO_ROOT/apps/web/public $REPO_ROOT/apps/web/.next/standalone/apps/web/ || echo "No public dir")
      artifacts:
        # BaseDirectory relativo al appRoot (apps/web)
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      startCommand: node server.js
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
