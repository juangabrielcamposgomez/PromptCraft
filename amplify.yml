version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web run build
            # ✅ Corrigiendo Path & Permisos:
            # Eliminamos mkdir (ya existe por Next.js) y usamos rutas absolutas desde la raíz
            - cp -r apps/web/public apps/web/.next/standalone/apps/web/
            - cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
