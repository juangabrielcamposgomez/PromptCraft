version: 1
applications:
  - appRoot: apps/web
    platform: WEB_COMPUTE
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd $(git rev-parse --show-toplevel) && pnpm install --frozen-lockfile
            - cd $(git rev-parse --show-toplevel) && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - REPO=$(git rev-parse --show-toplevel) && cd $REPO && pnpm --filter web build && cp -r $REPO/apps/web/.next/static $REPO/apps/web/.next/standalone/apps/web/.next/static && cp -r $REPO/apps/web/public $REPO/apps/web/.next/standalone/apps/web/public
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      startCommand: HOSTNAME=0.0.0.0 node apps/web/server.js
