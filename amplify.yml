version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web run build
            # 🔍 Diagnóstico (Mantenemos esto para confirmar rutas)
            - echo "--- LOCALIZANDO SERVER.JS ---"
            - find ../../ -name "server.js" -path "*standalone*" 2>/dev/null || echo "server.js not found"
            # Copia de assets a la ruta standalone
            - cp -r .next/static .next/standalone/apps/web/.next/static || true
            - "[ -d public ] && cp -r public .next/standalone/apps/web/ || true"
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      # ✅ Comando de inicio explícito para WEB_COMPUTE
      startCommand: node server.js
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
