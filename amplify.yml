version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            # ✅ Fix EACCES: Ejecutamos el build localmente en apps/web 
            # para evitar que pnpm escanee el root del sistema (/run/cryptsetup)
            - pnpm run build
            # ✅ Estructura Standalone:
            - mkdir -p .next/standalone/apps/web/.next
            - cp -r public .next/standalone/apps/web/
            - cp -r .next/static .next/standalone/apps/web/.next/
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
