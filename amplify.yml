version: 1
applications:
  - appRoot: apps/web
    platform: WEB_COMPUTE
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web build && echo '=== .next contents ===' && ls apps/web/.next/ && echo '=== standalone contents ===' && ls apps/web/.next/standalone/apps/web/
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      startCommand: node server.js
