version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - pnpm install
            - pnpm --filter @devflow/core prisma generate
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
