version: 1
applications:
  - appRoot: apps/web
    platform: WEB_COMPUTE
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd $(git rev-parse --show-toplevel) && pnpm install --frozen-lockfile
            - cd $(git rev-parse --show-toplevel) && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd $(git rev-parse --show-toplevel) && pnpm --filter web build
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      startCommand: node server.js
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
