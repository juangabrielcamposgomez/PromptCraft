version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd $(git rev-parse --show-toplevel) && pnpm install --frozen-lockfile
            - cd $(git rev-parse --show-toplevel) && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd $(git rev-parse --show-toplevel) && pnpm --filter web run build
            # ✅ Ubicación dinámica y copia de assets
            - NEXT_DIR=$(find /codebuild -path "*/apps/web/.next" -not -path "*standalone*" -not -path "*node_modules*" 2>/dev/null | head -1) && cp -r $NEXT_DIR/static $NEXT_DIR/standalone/apps/web/.next/static && ([ -d $(dirname $NEXT_DIR)/public ] && cp -r $(dirname $NEXT_DIR)/public $NEXT_DIR/standalone/apps/web/ || echo "No public dir") && ls -R $NEXT_DIR/standalone/apps/web/
      artifacts:
        # ✅ Subimos la raíz de standalone para incluir node_modules/
        baseDirectory: .next/standalone
        files:
          - '**/*'
      # ✅ Iniciamos desde la carpeta anidada de la app
      startCommand: HOSTNAME=0.0.0.0 node apps/web/server.js
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
