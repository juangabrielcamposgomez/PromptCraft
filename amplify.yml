version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - echo "--- STARTING PREBUILD ---"
            - npm install -g pnpm@9.0.0
            - echo "--- PNPM INSTALLED ---"
            - cd ../.. && echo "--- RUNNING PNPM INSTALL ---" && pnpm install --frozen-lockfile --reporter=append-only
            - cd ../.. && echo "--- INSTALL FINISHED, CHECKING PRISMA ---" && ls -la packages/core/node_modules/@prisma/client || echo "Prisma client not found yet"
            - cd ../.. && echo "--- RUNNING PRISMA GENERATE ---" && pnpm --filter @devflow/core exec prisma generate
            - echo "--- PREBUILD COMPLETADO ---"
        build:
          commands:
            - echo "--- STARTING BUILD ---"
            - cd ../.. && pnpm --filter web build
            - echo "--- BUILD FINISHED, COPYING FILES ---"
            - mkdir -p .next/standalone/apps/web/.next
            - cp -r public .next/standalone/apps/web/ || echo "Public folder missing"
            - cp -r .next/static .next/standalone/apps/web/.next/ || echo "Static folder missing"
            - echo "--- ASSETS COPIED ---"
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
