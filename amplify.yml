version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            # 1. Ejecutamos build desde la raíz para aprovechar los filtros de pnpm
            - cd ../.. && pnpm --filter web run build
            # 2. Amplify nos devuelve al contexto de apps/web en el siguiente comando.
            # Copiamos assets usando rutas relativas al appRoot actual.
            - cp -r public .next/standalone/apps/web/
            - cp -r .next/static .next/standalone/apps/web/.next/
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
