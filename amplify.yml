version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web run build
            # ✅ Fix Robusto: Copia condicional de assets desde la raíz
            - cd ../.. && [ -d apps/web/public ] && cp -r apps/web/public apps/web/.next/standalone/apps/web/ || echo "Public dir missing or empty"
            - cd ../.. && [ -d apps/web/.next/static ] && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/ || echo "Static dir missing"
      artifacts:
        baseDirectory: .next/standalone/apps/web
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
