version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9.0.0
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web run build
            # ✅ Corrigiendo Paths: Usamos rutas ancladas a la raíz mediante ../../
            - cp -r ../../apps/web/.next/static ../../apps/web/.next/standalone/apps/web/.next/static
            - '[ -d ../../apps/web/public ] && cp -r ../../apps/web/public ../../apps/web/.next/standalone/apps/web/ || echo "No public dir"'
      artifacts:
        # BaseDirectory anclado también
        baseDirectory: ../../apps/web/.next/standalone/apps/web
        files:
          - '**/*'
      startCommand: node server.js
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../apps/web/.next/cache/**/*
