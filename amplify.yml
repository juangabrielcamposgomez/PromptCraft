version: 1
applications:
  - appRoot: apps/web
    frontend:
      platform: WEB_COMPUTE
      phases:
        preBuild:
          commands:
            # 1. Instalamos la versión exacta de pnpm para evitar conflictos
            - npm install -g pnpm@9.0.0
            # 2. Instalamos dependencias del espacio de trabajo
            - cd ../.. && pnpm install --frozen-lockfile
            # 3. Generamos el cliente de Prisma
            - cd ../.. && pnpm --filter @devflow/core exec prisma generate
        build:
          commands:
            - cd ../.. && pnpm --filter web build
            # ✅ Estructura Standalone para Monorepo:
            - mkdir -p .next/standalone/apps/web/.next
            - cp -r public .next/standalone/apps/web/
            - cp -r .next/static .next/standalone/apps/web/.next/
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
